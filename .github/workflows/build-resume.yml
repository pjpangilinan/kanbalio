name: Build LaTeX Résumé

on:
  push:
    branches: [main]
    paths:
      - 'resume/**'
      - '.github/workflows/build-resume.yml'

permissions:
  contents: write

concurrency:
  group: resume
  cancel-in-progress: true

jobs:
  build-resume:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume/resume.tex
          latexmk_use_xelatex: true

      - name: Move PDF to public/
        run: mv resume.pdf public/resume.pdf

      - name: Commit updated PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'ci: update resume.pdf from resume.tex'
          file_pattern: public/resume.pdf
