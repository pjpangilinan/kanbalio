name: Build LaTeX Résumé

on:
  push:
    branches: [main]
    paths:
      - 'resume/**'
      - '.github/workflows/build-resume.yml'

permissions:
  contents: write

concurrency:
  group: resume
  cancel-in-progress: true

jobs:
  build-resume:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-extra

      - name: Compile résumé
        run: |
          cd resume
          pdflatex -interaction=nonstopmode -halt-on-error resume.tex
          pdflatex -interaction=nonstopmode -halt-on-error resume.tex
          cd ..

      - name: Copy PDF to public/
        run: |
          mkdir -p public
          cp resume/resume.pdf public/resume.pdf

      - name: Commit PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'ci: update resume.pdf from resume.tex'
          file_pattern: public/resume.pdf
